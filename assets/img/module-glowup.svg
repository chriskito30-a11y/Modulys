<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">GlowUp</title>
  <desc id="desc">Téléphones du public transformés en show lumineux.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#111827"/><stop offset=".45" stop-color="#4c1d95"/><stop offset="1" stop-color="#db2777"/></linearGradient>
    <linearGradient id="screen1" x1="0" x2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="screen2" x1="0" x2="1"><stop offset="0" stop-color="#fef08a"/><stop offset="1" stop-color="#fb7185"/></linearGradient>
    <linearGradient id="screen3" x1="0" x2="1"><stop offset="0" stop-color="#86efac"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="18" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="960" height="640" rx="54" fill="url(#bg)"/>
  <circle cx="206" cy="154" r="104" fill="#a78bfa" opacity=".22"/>
  <circle cx="780" cy="472" r="138" fill="#f0abfc" opacity=".18"/>
  <path d="M142 214c88 72 188 108 300 108s218-38 318-114" fill="none" stroke="#fff" stroke-opacity=".25" stroke-width="10" stroke-linecap="round"/>
  <g filter="url(#glow)">
    <rect x="176" y="252" width="122" height="216" rx="26" fill="#0f172a" stroke="#fff" stroke-opacity=".22" stroke-width="7" transform="rotate(-9 237 360)"/>
    <rect x="192" y="276" width="90" height="164" rx="16" fill="url(#screen1)" transform="rotate(-9 237 360)"/>
    <rect x="415" y="184" width="130" height="244" rx="30" fill="#0f172a" stroke="#fff" stroke-opacity=".25" stroke-width="8"/>
    <rect x="433" y="211" width="94" height="186" rx="18" fill="url(#screen2)"/>
    <rect x="664" y="258" width="122" height="216" rx="26" fill="#0f172a" stroke="#fff" stroke-opacity=".22" stroke-width="7" transform="rotate(9 725 366)"/>
    <rect x="680" y="282" width="90" height="164" rx="16" fill="url(#screen3)" transform="rotate(9 725 366)"/>
  </g>
  <g fill="#fff" opacity=".9">
    <circle cx="334" cy="186" r="8"/><circle cx="374" cy="146" r="5"/><circle cx="612" cy="168" r="7"/><circle cx="646" cy="214" r="5"/><circle cx="290" cy="496" r="6"/><circle cx="610" cy="500" r="8"/>
  </g>
  <text x="480" y="555" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="76" font-weight="900" fill="#fff" letter-spacing="-4">GlowUp</text>
  <text x="480" y="596" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="700" fill="#fce7f3">Le public devient la lumière du spectacle</text>
</svg>
