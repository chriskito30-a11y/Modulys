<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">QuizMaster</title>
  <desc id="desc">Illustration d'un module de quiz interactif avec questions, réponses et classement.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ede9fe"/>
      <stop offset="0.55" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="900" height="560" rx="44" fill="url(#bg)"/>
  <circle cx="760" cy="105" r="74" fill="#7c3aed" opacity=".12"/>
  <circle cx="130" cy="440" r="94" fill="#06b6d4" opacity=".13"/>

  <g filter="url(#shadow)">
    <rect x="145" y="72" width="610" height="398" rx="34" fill="#fff"/>
    <rect x="145" y="72" width="610" height="70" rx="34" fill="#f8fafc"/>
    <circle cx="190" cy="107" r="10" fill="#fca5a5"/>
    <circle cx="222" cy="107" r="10" fill="#fcd34d"/>
    <circle cx="254" cy="107" r="10" fill="#86efac"/>

    <rect x="190" y="178" width="340" height="38" rx="19" fill="#ede9fe"/>
    <text x="210" y="204" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#5b21b6">Question 4 / 10</text>

    <text x="190" y="264" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="#111827">Quel est le bon choix ?</text>

    <g font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">
      <rect x="190" y="305" width="245" height="58" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
      <text x="215" y="342" fill="#334155">A · Réponse 1</text>
      <rect x="465" y="305" width="245" height="58" rx="18" fill="url(#main)"/>
      <text x="490" y="342" fill="#fff">B · Réponse 2</text>
      <rect x="190" y="382" width="245" height="58" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
      <text x="215" y="419" fill="#334155">C · Réponse 3</text>
      <rect x="465" y="382" width="245" height="58" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
      <text x="490" y="419" fill="#334155">D · Réponse 4</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="188" width="190" height="166" rx="28" fill="#111827"/>
    <text x="623" y="233" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900" fill="#cbd5e1">TIMER</text>
    <text x="624" y="294" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900" fill="#fff">18s</text>
    <rect x="624" y="316" width="118" height="10" rx="5" fill="#334155"/>
    <rect x="624" y="316" width="78" height="10" rx="5" fill="#06b6d4"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="98" y="218" width="162" height="142" rx="26" fill="#fff"/>
    <text x="128" y="259" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#111827">Classement</text>
    <text x="128" y="294" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#7c3aed">1. Team A</text>
    <text x="128" y="323" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#475569">2. Team B</text>
    <text x="128" y="352" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#475569">3. Team C</text>
  </g>
</svg>
